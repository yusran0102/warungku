version: "3.9"

services:
  app:
    build: .
    image: warungku:latest
    container_name: warungku_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET}"
      PORT: "3000"
      APP_ENV: "production"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - warungku_net

  db:
    image: postgres:16-alpine
    container_name: warungku_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - warungku_net
    # Do NOT expose port 5432 in production!
    # ports:
    #   - "5432:5432"   # uncomment for local dev only

  # Optional: Nginx reverse proxy (recommended for production)
  nginx:
    image: nginx:alpine
    container_name: warungku_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro              # Put your SSL certs here
    depends_on:
      - app
    networks:
      - warungku_net

volumes:
  postgres_data:

networks:
  warungku_net:
    driver: bridge
