<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-teal-100 via-teal-50 to-teal-100 p-4 py-10 relative overflow-hidden">
  <div class="absolute -top-40 -right-40 w-80 h-80 bg-teal-400 rounded-full mix-blend-multiply filter blur-xl opacity-15 animate-blob"></div>
  <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-teal-500 rounded-full mix-blend-multiply filter blur-xl opacity-15 animate-blob" style="animation-delay:2s"></div>

  <div class="bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl w-full max-w-md p-8 relative z-10">
    <div class="text-center mb-6">
      <div class="w-16 h-16 rounded-2xl bg-teal-600 flex items-center justify-center mx-auto mb-4 shadow-lg">
        <span class="text-3xl">🍳</span>
      </div>
      <h1 class="text-2xl font-bold text-teal-600">Daftar Member</h1>
      <p class="text-gray-500 text-sm mt-1">Dapatkan poin setiap pembelian</p>
    </div>

    <!-- Benefits -->
    <div class="bg-teal-50 rounded-xl p-4 border border-teal-100 mb-6">
      <p class="text-xs font-semibold text-gray-700 mb-2 flex items-center gap-1.5">✨ Keuntungan Member:</p>
      <ul class="space-y-1 text-xs text-gray-600">
        <li>✨ Dapatkan poin setiap pembelian</li>
        <li>🎁 Hadiah ulang tahun eksklusif</li>
        <li>💰 Tukar poin untuk potongan harga</li>
      </ul>
    </div>

    {{if .Error}}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm mb-5">{{.Error}}</div>
    {{end}}

    <form action="/register" method="POST" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1.5">Nama Lengkap <span class="text-red-500">*</span></label>
        <input type="text" name="name" required placeholder="Nama Lengkap" maxlength="80"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 transition" />
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1.5">No. WhatsApp <span class="text-red-500">*</span></label>
        <input type="tel" name="phone" required placeholder="0812 3456 7890" inputmode="tel"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 transition" />
        <p class="text-xs text-gray-400 mt-1">Digunakan untuk login dan klaim poin</p>
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1.5">Tanggal Lahir <span class="text-red-500">*</span></label>
        <input type="date" name="birthday" required
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 transition" />
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1.5">Alamat <span class="text-red-500">*</span></label>
        <textarea name="address" required placeholder="Nama Jalan, Kota, Kode Pos" maxlength="250" rows="2"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 transition resize-none"></textarea>
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1.5">Email <span class="text-gray-400 font-normal">(opsional)</span></label>
        <input type="email" name="email" placeholder="you@example.com"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 transition" />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1.5">Password <span class="text-red-500">*</span></label>
          <div class="relative">
            <input type="password" name="password" id="pw-reg" required placeholder="Min. 6 karakter" minlength="6"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm pr-10 focus:outline-none focus:ring-2 focus:ring-teal-400 transition" />
            <button type="button" onclick="togglePw('pw-reg',this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1.5">Konfirmasi <span class="text-red-500">*</span></label>
          <input type="password" name="confirmPassword" id="pw-conf" required placeholder="Ulangi password"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 transition" />
        </div>
      </div>

      <button type="submit"
        class="w-full bg-teal-600 hover:bg-teal-500 text-white font-semibold py-2.5 rounded-xl transition-all shadow-lg hover:shadow-xl flex items-center justify-center gap-2 mt-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
        Daftar Member
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-5">
      Sudah punya akun?
      <a href="/login" class="text-teal-600 hover:underline font-medium">Login</a>
    </p>
  </div>
</div>
<script>
function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}
</script>
